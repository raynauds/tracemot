    <!-- Fontes servies par le jeu (public/fonts) : les @font-face vivent dans
         src/theme/fonts.css. On précharge les seules faces du PREMIER écran, la
         carte - son titre (serif 700), ses accroches (serif 400 et son
         italique) et ses chiffres (mono 600). Sans ce preload, le navigateur ne
         les découvrirait qu'après avoir lu le CSS, et le boot attend les fontes
         (body.booting). Les autres faces se chargent au lancement d'une partie. -->
    <link
      rel="preload"
      href="/fonts/SourceSerif4-Regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/SourceSerif4-Bold.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/IBMPlexMono-SemiBold.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

              </svg>
            </figure>
            <div class="help-text">
              <span class="help-num">02</span>
              <h3 class="help-heading"></h3>
              <p class="help-line"></p>
            </div>
          </li>
          <li class="help-step">
            <figure class="help-fig" aria-hidden="true">
              <div class="help-ledger">
                <div class="help-ledger-row">
                  <span class="help-ledger-num">01</span>
                  <span class="help-ledger-word">MOT</span>
                  <span class="help-ledger-check"></span>
                </div>
                <div class="help-ledger-row">
                  <span class="help-ledger-num">02</span>
                  <span class="help-ledger-word">RAS</span>
                  <span class="help-ledger-check"></span>
                </div>
                <div class="help-ledger-row">
                  <span class="help-ledger-num">03</span>
                  <span class="help-ledger-word">CLE</span>
                  <span class="help-ledger-check"></span>
                </div>
                <span class="help-ledger-count">3 / 3</span>
              </div>
            </figure>
            <div class="help-text">
              <span class="help-num">03</span>
              <h3 class="help-heading"></h3>
              <p class="help-line"></p>
            </div>
          </li>
          <li class="help-step">
            <figure class="help-fig" aria-hidden="true">
              <div class="help-map">
                <span class="help-map-cell is-validated"
                  >1<span class="help-map-check"></span
                ></span>
                <span class="help-map-cell is-validated"
                  >2<span class="help-map-check"></span
                ></span>
                <span class="help-map-cell">3</span>
                <span class="help-map-defi"
                  ><span class="help-map-star"></span
                  ><span class="help-map-defi-label"></span></span
                >
              </div>
            </figure>
            <div class="help-text">
              <span class="help-num">04</span>
              <h3 class="help-heading"></h3>
              <p class="help-line"></p>
            </div>
          </li>
        </ol>
        <!-- Visible seulement quand l'écran s'ouvre de lui-même à la première
             partie : la grille attend juste dessous, le bouton y plonge. -->
        <button type="button" class="help-start" id="help-start" hidden></button>
      </div>
    </div>

    <!-- Crédits : attributions des sons et des caractères, ouvertes par le
         menu (rouage). L'écran avait été retiré du build Rune (doc 08 § Q21c,
         « pas de branding/liens ») ; il revient en TEXTE NU — aucun lien,
         aucune URL : certaines licences (CC BY 4.0) demandent une attribution
         visible dans le produit même, la best practice ne proscrit que les
         liens sortants. docs/ATTRIBUTIONS.md reste la référence contractuelle
         (Dev Dashboard compris). Squelette partagé avec « Comment jouer »
         (src/render/screen.css) ; contenu posé par src/render/credits.ts via
         Rune.t() : rien de traduisible en dur ici. -->
    <div class="screen credits" id="credits" hidden>
      <header class="screen-head">
        <button type="button" class="screen-close" id="credits-close"></button>
      </header>
      <div class="screen-body">
        <h2 class="screen-title" id="credits-title"></h2>
        <dl class="credits-list" id="credits-list"></dl>
      </div>
    </div>

    <!-- Carte de progression : le PREMIER écran du jeu (doc 08 § Q21a — plus
         d'accueil, « pas de menu »), plein écran, au-dessus du chrome de
         partie. Son contenu est entièrement généré par src/render/map.ts ;
         quand elle est affichée, le corps porte .map-open et le chrome de
         partie ci-dessous est masqué (style.css). -->
    <div class="map" id="map" hidden></div>

    <header class="header">
      <div class="header-left">
        <!-- Niveau en cours (« 5×5 · 1-12 »), écrit par src/render/render.ts :
             le seul repère du joueur une fois la carte masquée. L'ancienne
             flèche « retour » a rejoint le menu sous son vrai nom — QUITTER LA
             PARTIE : quitter est une proposition d'abandon soumise au vote de
             la room (doc 02/04), pas une navigation gratuite ; une flèche le
             taisait. -->
        <span class="level-id" id="level-id"></span>
      </div>
      <!-- Bord droit du header : le rouage du menu — seul bouton restant ici,
           l'ex-« i » de la règle est couvert par l'entrée COMMENT JOUER du
           menu, le panneau audio a disparu (doc 08 § Q21b, Rune fournit ses
           propres contrôles). -->
      <div class="header-right">
        <!-- Icône rouage nue (posée par src/render/menu.ts, comme les
             libellés via Rune.t). Son homologue de la carte est reconstruit à
             chaque rendu (src/render/map.ts) ; le panneau, lui, est unique et
             vit au niveau du body, plus bas. -->
        <button
          type="button"
          class="menu-chip"
          id="menu-chip-game"
          aria-haspopup="dialog"
          aria-expanded="false"
        ></button>
      </div>
    </header>

    <!-- Menu du jeu (rouage) : COMMENT JOUER, CRÉDITS et — en partie
         seulement — QUITTER LA PARTIE. Un seul panneau (voile + popover
         desktop, feuille mobile : le composant partagé de src/render/panel.css)
         pour ses deux déclencheurs, le rouage du header de partie ci-dessus et
         celui du header de la carte. Posé au niveau du body : ancré dans un
         header, il resterait sous la carte (z-index 40 contre 25). Contenu et
         événements : src/render/menu.ts. -->
    <div class="diff-overlay menu-overlay" id="menu-overlay" hidden></div>
    <div class="diff-panel menu-panel" id="menu-panel" role="dialog" hidden>
      <div class="diff-panel-head">
        <span class="diff-panel-title" id="menu-title"></span>
        <!-- La croix est une icône SVG posée par src/render/menu.ts. -->
        <button type="button" class="diff-close" id="menu-close"></button>
      </div>
      <button type="button" class="menu-item" id="menu-help"></button>
      <button type="button" class="menu-item" id="menu-credits"></button>
      <!-- Masqué sur la carte (rien à quitter : proposer un niveau EST le
           geste de départ) ; src/render/menu.ts tranche à chaque ouverture. -->
      <button
        type="button"
        class="menu-item menu-item-quit"
        id="menu-quit"
        hidden
      ></button>
    </div>

    <!-- Registre « Mots trouvés » : panneau flottant repliable ancré à droite.
         Ouvert par défaut sur desktop, replié en pastille (n / N) sur mobile
         (src/render/render.ts pose la classe .collapsed selon la largeur). -->
    <section class="ledger" id="ledger">
      <button
        type="button"
        class="ledger-head"
        id="ledger-toggle"
        aria-expanded="true"
        aria-controls="word-list"
      >
        <!-- Texte posé par src/render/render.ts via Rune.t(). -->
        <span class="ledger-label" id="ledger-label"></span>
        <!-- Pré-rempli (0 / wordCount du mode par défaut) pour éviter un
             shift ; src/render/render.ts réécrit selon le niveau lancé puis à
             chaque mot. -->
        <span class="counter" id="counter"
          ><span class="count">0</span> / 5</span
        >
        <!-- Le chevron est une icône SVG posée par src/render/render.ts. -->
        <span class="ledger-caret" id="ledger-caret" aria-hidden="true"></span>
      </button>
      <!-- Lignes pré-rendues (mode par défaut, voir src/game/config.ts) pour éviter
           un shift au chargement ; src/render/render.ts les adopte et ajuste leur
           nombre au niveau lancé (un défi quadruple le nombre de mots). -->
      <ol class="word-list" id="word-list">
        <li class="word-row empty">
          <span class="word-num">01</span>
          <span class="word-dots">· · · · ·</span>
        </li>
        <li class="word-row empty">
          <span class="word-num">02</span>
          <span class="word-dots">· · · · ·</span>
        </li>
        <li class="word-row empty">
          <span class="word-num">03</span>
          <span class="word-dots">· · · · ·</span>
        </li>
        <li class="word-row empty">
          <span class="word-num">04</span>
          <span class="word-dots">· · · · ·</span>
        </li>
        <li class="word-row empty">
          <span class="word-num">05</span>
          <span class="word-dots">· · · · ·</span>
        </li>
      </ol>
    </section>

    <!-- Victoire : overlay plein écran au-dessus du canvas. Les deux boutons de
         tête sont peuplés à la volée (src/render/render.ts) avec ce que la
         victoire vient d'ouvrir : le niveau suivant, et le défi quand une fin
         de ligne l'a débloqué. Le retour à la carte reste toujours offert -
         localement (doc 02 § Machine de phase) : aucune action Rune, la partie
         reste en place pour la room tant qu'une proposition n'a pas été
         acceptée. -->
    <div class="win" id="win" hidden>
      <span class="confetti c1"></span>
      <span class="confetti c2 cream"></span>
      <span class="confetti c3"></span>
      <span class="confetti c4 cream"></span>
      <span class="confetti c5"></span>
      <span class="confetti c6"></span>
      <!-- Texte posé par src/render/render.ts via Rune.t() ; le point reste un
           signe décoratif séparé (dot). -->
      <div class="win-title"><span id="win-title-text"></span><span class="dot">.</span></div>
      <div class="win-sub" id="win-sub"></div>
      <!-- Classement (doc 07) : un joueur par ligne, tri par mots décroissant,
           masqué en solo dans la room (rien à classer) — entièrement rendu
           par src/render/render.ts depuis winSummary. -->
      <ol class="win-standings" id="win-standings" hidden></ol>
      <!-- Étoile : rendu uniquement à la première validation d'un défi
           (src/render/render.ts). La seconde ligne annonce ce que l'étoile
           débloque, et disparaît quand elle ne débloque rien. -->
      <div class="win-star" id="win-star" hidden>
        <span class="win-star-gain" id="win-star-gain"></span>
        <span class="win-star-unlock" id="win-star-unlock" hidden></span>
      </div>
      <div class="win-actions">
        <button type="button" class="win-primary" id="win-next" hidden></button>
        <button type="button" class="win-defi" id="win-defi" hidden></button>
        <!-- Texte posé par src/render/render.ts via Rune.t(). -->
        <button type="button" class="win-second" id="win-map"></button>
      </div>
    </div>

    <!-- Lobby de proposition/vote (doc 02/04) : un SEUL de ces deux états est
         visible à la fois (src/render/lobby.ts en décide) — l'auteur d'une
         proposition (et tout joueur qui a déjà répondu) voit l'attente des
         autres, ceux qui n'ont pas encore répondu voient le prompt
         accepter/refuser. Posé au-dessus de la carte ET de la victoire
         (src/render/lobby.css) : une proposition peut survenir sur n'importe
         quel écran local. Contenu entièrement généré par src/render/lobby.ts. -->
    <div class="lobby-veil" id="lobby-veil" hidden>
      <div class="lobby-card" id="lobby-card" role="dialog" aria-modal="true"></div>
    </div>

    <!-- Notifications éphémères (doc 04) : refus, absence de réponse, course
         de propositions, arrivées/départs de joueurs. Empilées, générées par
         src/render/snackbar.ts — aucun contenu statique ici. -->
    <div class="snackbar-stack" id="snackbar-stack" aria-live="polite"></div>

    <!-- Logique Rune : fichier séparé, empaqueté par vite-plugin-rune en
         logic.js (déterministe, tourne aussi côté serveur) — état de la room,
         progression partagée, lobby de proposition/vote, validation
         autoritaire des mots (docs 01/02). -->
    <script type="module" src="src/logic/logic.ts"></script>
    <!-- Client : Rune.initClient({ onChange }) est la SEULE entrée du rendu
         (doc 02 § Client) — src/client/client.ts, plus de main.ts séparé. -->
    <script type="module" src="src/client/client.ts"></script>
  </body>
</html>
