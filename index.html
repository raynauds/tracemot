<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Tracemot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400;1,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- La grille et le tracé sont rendus par PixiJS (src/render/scene.ts) sur un
         canvas plein écran en fond (position: fixed, z-index: 0). Tout le
         chrome ci-dessous est en surimpression (overlays position: fixed).
         Les conteneurs d'overlay laissent passer les events de tracé
         (pointer-events: none) ; seuls les contrôles interactifs les
         réactivent (pointer-events: auto). -->

    <!-- Carte de progression : écran d'accueil, plein écran, au-dessus de tout
         le reste. Son contenu est entièrement généré par src/render/map.ts ;
         quand elle est affichée, le corps porte .map-open et le chrome de
         partie ci-dessous est masqué (style.css). -->
    <div class="map" id="map" hidden></div>

    <header class="header">
      <div class="header-left">
        <h1 class="title">Tracemot</h1>
        <!-- Retour à la carte : sortie de partie, toujours disponible. -->
        <button type="button" class="back-map" id="back-map">← CARTE</button>
        <!-- Niveau en cours (« 5×5 · 1-12 »), écrit par src/render/render.ts. -->
        <span class="level-id" id="level-id"></span>
        <!-- Règle du jeu : bouton discret « ? ». Il ouvre le composant voile +
             panneau (popover desktop, feuille mobile) hérité du sélecteur de
             difficulté disparu — les classes .diff-overlay / .diff-panel lui
             survivent et restent partagées. -->
        <div class="rule" id="rule">
          <button
            type="button"
            class="rule-chip"
            id="rule-chip"
            aria-haspopup="dialog"
            aria-expanded="false"
            aria-label="Règle du jeu"
            title="Règle du jeu"
          >
            ?
          </button>
          <div class="diff-overlay" id="rule-overlay" hidden></div>
          <div
            class="diff-panel rule-panel"
            id="rule-panel"
            role="dialog"
            aria-label="Règle du jeu"
            hidden
          >
            <div class="diff-panel-head">
              <span class="diff-panel-title">RÈGLE</span>
              <button
                type="button"
                class="diff-close"
                id="rule-close"
                aria-label="Fermer"
              >
                ✕
              </button>
            </div>
            <p class="rule-line">
              Reliez des lettres voisines pour tracer les mots. Chaque lettre ne
              sert qu'une fois.
            </p>
            <!-- Nombres pré-remplis (mode par défaut) pour éviter un shift ;
                 src/render/render.ts réécrit selon le niveau lancé. -->
            <p class="rule-spec" id="rule-spec">5 mots · 5 lettres</p>
          </div>
        </div>
      </div>
      <div class="header-right">
        <span class="chrono-label">CHRONO</span>
        <span class="chrono" id="chrono">00:00</span>
      </div>
    </header>

    <!-- Registre « Mots trouvés » : panneau flottant repliable ancré à droite.
         Ouvert par défaut sur desktop, replié en pastille (n / N) sur mobile
         (src/render/render.ts pose la classe .collapsed selon la largeur). -->
    <section class="ledger" id="ledger">
      <button
        type="button"
        class="ledger-head"
        id="ledger-toggle"
        aria-expanded="true"
        aria-controls="word-list"
      >
        <span class="ledger-label">MOTS TROUVÉS</span>
        <!-- Pré-rempli (0 / wordCount du mode par défaut) pour éviter un
             shift ; src/render/render.ts réécrit selon le niveau lancé puis à
             chaque mot. -->
        <span class="counter" id="counter"
          ><span class="count">0</span> / 5</span
        >
        <span class="ledger-caret" aria-hidden="true"></span>
      </button>
      <!-- Lignes pré-rendues (mode par défaut, voir src/game/config.ts) pour éviter
           un shift au chargement ; src/render/render.ts les adopte et ajuste leur
           nombre au niveau lancé (un défi quadruple le nombre de mots). -->
      <ol class="word-list" id="word-list">
        <li class="word-row empty">
          <span class="word-num">01</span>
          <span class="word-dots">· · · · ·</span>
        </li>
        <li class="word-row empty">
          <span class="word-num">02</span>
          <span class="word-dots">· · · · ·</span>
        </li>
        <li class="word-row empty">
          <span class="word-num">03</span>
          <span class="word-dots">· · · · ·</span>
        </li>
        <li class="word-row empty">
          <span class="word-num">04</span>
          <span class="word-dots">· · · · ·</span>
        </li>
        <li class="word-row empty">
          <span class="word-num">05</span>
          <span class="word-dots">· · · · ·</span>
        </li>
      </ol>
    </section>

    <!-- Statut : overlay plein écran, réservé aux erreurs (chargement des
         niveaux). Rien à annoncer au boot : la carte s'affiche sans réseau. -->
    <div class="status" id="status" hidden></div>

    <!-- Victoire : overlay plein écran au-dessus du canvas. Action principale =
         retour à la carte (la progression y est visible) ; rejouer le même
         niveau est l'action secondaire. -->
    <div class="win" id="win" hidden>
      <span class="confetti c1"></span>
      <span class="confetti c2 cream"></span>
      <span class="confetti c3"></span>
      <span class="confetti c4 cream"></span>
      <span class="confetti c5"></span>
      <span class="confetti c6"></span>
      <div class="win-title">Gagné<span class="dot">.</span></div>
      <div class="win-sub" id="win-sub"></div>
      <!-- Étoile : rendu uniquement à la première validation d'un défi
           (src/render/render.ts). La seconde ligne annonce ce que l'étoile
           débloque, et disparaît quand elle ne débloque rien. -->
      <div class="win-star" id="win-star" hidden>
        <span class="win-star-gain" id="win-star-gain"></span>
        <span class="win-star-unlock" id="win-star-unlock" hidden></span>
      </div>
      <div class="win-actions">
        <button type="button" class="win-replay" id="win-map">
          RETOUR À LA CARTE
        </button>
        <button type="button" class="win-second" id="replay">REJOUER</button>
      </div>
    </div>

    <script type="module" src="src/main.ts"></script>
  </body>
</html>
